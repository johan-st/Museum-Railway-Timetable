# Kör validering vid push och pull request (samma som lokalt: php scripts/validate.php)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Validate plugin structure and PHP syntax
        run: php scripts/validate.php

      - name: PHPUnit
        run: composer test
